<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>zmr-code-json</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a; --accent: #38bdf8; --text: #f1f5f9;
            --folder: #fbbf24; --card: #1e293b; --glass: rgba(30, 41, 59, 0.9);
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header {
    position: fixed; /* Header ko top par lock karne ke liye */
    top: 0;
    left: 0;
    width: 100%;
    height: 65px;
    z-index: 1000;
    background: var(--glass);
    display: flex;
    align-items: center;
    padding: 0 15px;
    padding-top: env(safe-area-inset-top); /* Mobile notch ke liye */
}

.sidebar {
    padding-top: 0px; /* Header ke niche se content shuru karne ke liye gap */
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
}

        
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info i { color: var(--accent); font-size: 1.6rem; }
        .user-details div:first-child { font-size: 0.7rem; opacity: 0.6; }
        .user-details div:last-child { font-weight: bold; font-size: 0.9rem; }

        .logout-btn { color: #ef4444; font-size: 1.4rem; cursor: pointer; padding: 5px; display: none; }
        .admin-mode .logout-btn { display: block; }
        .admin-mode #authBtn { display: none; }

        .container { flex: 1; position: relative; overflow: hidden; }
        .sidebar { width: 100%; height: 100%; display: flex; flex-direction: column; background: #0f172a; }

        .list-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .item-list { overflow-y: auto; flex: 1; padding-bottom: 150px; }

        .list-item { 
            padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .item-left { display: flex; align-items: center; gap: 15px; }
        .item-info { display: flex; flex-direction: column; }
        .item-title { font-weight: 500; font-size: 0.95rem; }
        .marked-detail { font-size: 0.7rem; color: var(--success); margin-top: 4px; font-weight: 500; }

        .tick-icon { font-size: 1.2rem; display: none; }
        .admin-mode .tick-icon { display: block; }
        .is-verified { color: var(--success); }
        .not-verified { color: rgba(255,255,255,0.1); }

        .tab-switcher { 
            position: absolute; bottom: 90px; left: 20px; right: 20px;
            display: flex; background: var(--card); padding: 5px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); z-index: 50;
        }
        .tab-btn { flex: 1; padding: 12px; background: none; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 0.8rem; }
        .tab-btn.active { background: var(--accent); color: #000; }

        .main-content { 
            position: absolute; inset: 0; background: var(--bg);
            transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 20px; z-index: 200;
        }
        .show-editor .main-content { transform: translateX(0); }

        #titleDisplay { background: transparent; border: none; border-bottom: 2px solid var(--accent); color: white; font-size: 1.3rem; width: 100%; padding: 10px 0; outline: none; margin-bottom: 15px; }
        textarea#contentDisplay { flex: 1; background: var(--card); border-radius: 12px; padding: 15px; color: #cbd5e1; font-family: monospace; resize: none; border: 1px solid #334155; font-size: 0.95rem; outline: none; }

        #folderView { display: none; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; }
        .folder-icon { font-size: 6rem; color: var(--folder); margin-bottom: 20px; }

        .btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #000; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 25px;
            border-radius: 50px; font-size: 0.9rem; font-weight: bold;
            display: none; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-card { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 340px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .modal input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; margin-bottom: 15px; outline: none; }

        .admin-only { display: none !important; }
        .admin-mode .admin-only { display: inline-flex !important; }
        
       header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 15px;
    /* Safe area padding for mobile notches */
    padding-top: calc(10px + env(safe-area-inset-top)); 
    background: var(--glass);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    height: auto; /* Fixed height ki jagah auto use karein safe area ke liye */
    min-height: 65px;
    z-index: 1000; /* Ensure it stays on top */
    position: sticky; /* Fixed se better sticky kaam karta hai Chrome mobile par */
    top: 0;
    width: 100%;
}

/* Body par padding zaroori hai taaki content header ke peeche na chhupay */
body {
    padding-top: env(safe-area-inset-top);
}
 
        
        
    </style>
</head>
<body class="guest-mode">

    <div id="toast">Copied Successfully! </div>

    <div id="loginModal" class="modal">
        <div class="modal-card">
            <h2 style="margin-bottom:25px;"><i class="fa-solid fa-shield-halved" style="color:var(--accent)"></i> Admin Access</h2>
            <input type="text" id="userInput" placeholder="Username">
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn btn-primary" style="width:100%; justify-content:center; padding:15px;" onclick="handleLogin()">Login Now</button>
            <p onclick="closeModals()" style="margin-top:20px; color:var(--accent); cursor:pointer; font-size:0.8rem;">Go Back</p>
        </div>
    </div>

<div id="deniedModal" class="modal">
    <div class="modal-card" style="border: 2px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);">
        <div style="font-size: 3.5rem; color: #ef4444; margin-bottom: 15px;">
            <i class="fa-solid fa-shield-xmark"></i>
        </div>
        <h2 style="color: #ef4444; margin-bottom: 10px;">ACCESS DENIED</h2>
        <p style="color: #94a3b8; margin-bottom: 25px;">Invalid</p>
        <button class="btn" style="width: 100%; background: #ef4444; color: white; justify-content: center; font-weight: bold;" onclick="closeDeniedModal()">
            TRY AGAIN
        </button>
    </div>
</div>


    <div id="logoutModal" class="modal">
        <div class="modal-card">
            <div style="font-size:3rem; color:#ef4444; margin-bottom:15px;"><i class="fa-solid fa-power-off"></i></div>
            <h3 style="margin-bottom:25px;">Log out now?</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="flex:1; background:#334155; color:white; justify-content:center;" onclick="closeModals()">No</button>
                <button class="btn" style="flex:1; background:#ef4444; color:white; justify-content:center;" onclick="confirmLogout()">Yes, Logout</button>
            </div>
        </div>
    </div>
    
    <div id="deleteModal" class="modal">
    <div class="modal-card" style="border: 1px solid rgba(239, 68, 68, 0.3);">
        <div style="font-size: 3.5rem; color: #ef4444; margin-bottom: 15px;">
            <i class="fa-solid fa-trash-can-arrow-up"></i>
        </div>
        <h3 style="color: white; margin-bottom: 10px; font-size: 1.4rem;">Confirm Delete?</h3>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px;">
            Are you sure you want to permanently delete this item?
        </p>
        <div style="display: flex; gap: 12px;">
            <button class="btn" style="flex: 1; background: #334155; color: white; justify-content: center;" onclick="closeDeleteModal()">
                CANCEL
            </button>
            <button class="btn" style="flex: 1; background: #ef4444; color: white; justify-content: center;" onclick="confirmDeleteAction()">
                DELETE
            </button>
        </div>
    </div>
</div>


    <header>
        <div class="user-info">
            <i class="fa-solid fa-circle-user"></i>
            <div class="user-details">
                <div>Account</div>
                <div id="headerName">Guest Mode</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="authBtn" class="btn btn-primary" style="padding:8px 15px; font-size:0.75rem;" onclick="openLogin()">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
            <div class="logout-btn" onclick="openLogout()">
                <i class="fa-solid fa-power-off"></i>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="list-header">
                <span id="tabTitle" style="font-weight:bold; color:var(--accent);">JSON FILES</span>
                <div class="admin-only">
                    <input type="file" id="jsonInput" style="display:none" onchange="handleUpload(event)">
                    <button class="btn btn-primary" id="addBtn" onclick="actionTrigger()"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div id="itemList" class="item-list"></div>
            <div class="tab-switcher">
                <button id="tNotes" class="tab-btn" onclick="switchTab('notes')">NOTES</button>
                <button id="tJson" class="tab-btn active" onclick="switchTab('json')">FOLDERS</button>
            </div>
        </aside>

        <main class="main-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <button class="btn btn-primary" onclick="closeEditor()"><i class="fa-solid fa-arrow-left"></i></button>
                <div style="display:flex; gap:10px;">
                    <button id="mainDownloadBtn" class="btn" style="background:#22c55e; color:white;" onclick="downloadFile()">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button id="copyBtn" class="btn" style="background:#475569; color:white;" onclick="copyToClipboard()">
                        <i class="fa-solid fa-copy"></i>
                    </button>
                    <button class="btn admin-only" style="background:#ef4444; color:white;" onclick="deleteItem()"><i class="fa-solid fa-trash"></i></button>
                    <button class="btn btn-primary admin-only" onclick="saveToFirebase()">Save Cloud</button>
                </div>
            </div>
            <input type="text" id="titleDisplay" placeholder="Title">
            <textarea id="contentDisplay" placeholder="Content..."></textarea>
            
            <div id="folderView">
                <div class="folder-icon"><i class="fa-solid fa-folder-open"></i></div>
                <h3 id="fnLabel" style="margin-bottom: 25px;">file.json</h3>
                <button class="btn" style="background: #22c55e; color:white; width: 100%; justify-content: center; height: 55px;" onclick="downloadFile()">
                    <i class="fa-solid fa-download"></i> DOWNLOAD
                </button>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA3bsKfP7CxS0Sb0CY6xu_vFogVcxbJCII", authDomain: "ashcostingapp.firebaseapp.com", databaseURL: "https://ashcostingapp-default-rtdb.firebaseio.com", projectId: "ashcostingapp" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentMode = 'json', currentId = null, isAdmin = false, currentUsername = '';
        const users = 
        { 
          "zamir": "123",
          "ash": "123",
          "aisha": "123"
          };

        window.onload = () => {
            const savedUser = localStorage.getItem('loggedUser');
            if(savedUser) setAdminMode(savedUser);
            switchTab('notes');
        };

// Modal ko open aur close karne ka sahi logic
function openLogin() { 
    document.getElementById('loginModal').style.display = 'flex'; 
}

function openLogout() { 
    // Yahan galti thi, 'none' ki jagah 'flex' hona chahiye
    document.getElementById('logoutModal').style.display = 'flex'; 
}

function closeModals() { 
    document.getElementById('loginModal').style.display = 'none'; 
    document.getElementById('logoutModal').style.display = 'none'; 
}



        
function handleLogin() {
    const u = document.getElementById('userInput').value.toLowerCase().trim();
    const p = document.getElementById('passInput').value;

    if (users[u] === p) {
        localStorage.setItem('loggedUser', u);
        setAdminMode(u);
        closeModals();
        showToast("Login Successful", "success");
    } else {
        // Purana alert hata kar naya modal open karein
        document.getElementById('loginModal').style.display = 'none'; // Login modal band karein
        document.getElementById('deniedModal').style.display = 'flex'; // Denied modal dikhayein
    }
}

// Denied modal band karke wapas login par jaane ke liye
function closeDeniedModal() {
    document.getElementById('deniedModal').style.display = 'none';
    document.getElementById('loginModal').style.display = 'flex';
}

        function setAdminMode(username) {
            isAdmin = true; currentUsername = username;
            document.body.classList.remove('guest-mode'); 
            document.body.classList.add('admin-mode');
            document.getElementById('headerName').innerText = username.toUpperCase();
            switchTab(currentMode);
        }

        function confirmLogout() {
            localStorage.removeItem('loggedUser');
            location.reload();
        }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tabTitle').innerText = mode === 'json' ? 'JSON FILES' : 'NOTES';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(mode === 'json' ? 'tJson' : 'tNotes').classList.add('active');
            loadData();
        }

function getFormattedDate() {
    const now = new Date();
    
    // Date components
    const d = String(now.getDate()).padStart(2, '0');
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const y = now.getFullYear();
    
    // Time components
    let h = now.getHours();
    const min = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    
    // AM/PM Logic
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    h = h ? h : 12; // '0' baje ko '12' mein badalne ke liye
    const hDisplay = String(h).padStart(2, '0');

    // Return Format: [08-04-2026] [11:34:05 PM]
    return `${d}/${m}/${y}   ${hDisplay}:${min}:${s} ${ampm}`;
}

        function loadData() {
            db.ref(currentMode).on('value', snap => {
                const list = document.getElementById('itemList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    const icon = currentMode === 'json' ? 'fa-folder' : 'fa-file-lines';
                    const tickStatus = data.isMarked ? 'is-verified' : 'not-verified';
                    
                    let markedDetail = "";
                    if(data.isMarked && data.lastMarkedBy) {
                        markedDetail = `<div class="marked-detail">Last Marked by: ${data.lastMarkedBy} ${data.markedAt || ''}</div>`;
                    }

                    div.innerHTML = `
                        <div class="item-left">
                            <i class="fa-solid ${icon}" style="color:${currentMode === 'json' ? 'var(--folder)' : 'var(--accent)'}"></i>
                            <div class="item-info">
                                <span class="item-title">${data.title}</span>
                                ${markedDetail}
                            </div>
                        </div>
                        <div class="tick-icon ${tickStatus}" onclick="toggleTick(event, '${child.key}', ${data.isMarked})">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    `;
                    div.onclick = (e) => { if(!e.target.closest('.tick-icon')) openEditor(child.key, data); };
                    list.appendChild(div);
                });
            });
        }

        function toggleTick(e, id, status) {
            e.stopPropagation();
            if(!isAdmin) return;
            const newStatus = !status;
            db.ref(`${currentMode}/${id}`).update({ 
                isMarked: newStatus, 
                lastMarkedBy: currentUsername.toUpperCase(),
                markedAt: newStatus ? getFormattedDate() : "" 
            });
        }

        function openEditor(id, data) {
            currentId = id;
            document.getElementById('titleDisplay').value = data.title;
            document.getElementById('contentDisplay').value = data.content;
            document.getElementById('fnLabel').innerText = data.title + ".json";
            
            // Layout Logic
            if(currentMode === 'json') {
                // JSON Mode: Hide Copy Icon, Show Download Icon (based on Admin status or folder view)
                document.getElementById('copyBtn').style.display = 'none';
                
                if(!isAdmin) {
                    document.getElementById('contentDisplay').style.display = 'none';
                    document.getElementById('folderView').style.display = 'flex';
                    document.getElementById('mainDownloadBtn').style.display = 'none';
                } else {
                    document.getElementById('contentDisplay').style.display = 'block';
                    document.getElementById('folderView').style.display = 'none';
                    document.getElementById('mainDownloadBtn').style.display = 'flex';
                }
            } else {
                // Notes Mode: Hide Download Icon, Show Copy Icon
                document.getElementById('mainDownloadBtn').style.display = 'none';
                document.getElementById('copyBtn').style.display = 'flex';
                
                document.getElementById('contentDisplay').style.display = 'block';
                document.getElementById('folderView').style.display = 'none';
            }
            document.body.classList.add('show-editor');
        }
        



        function saveToFirebase() {
            const t = document.getElementById('titleDisplay').value;
            const c = document.getElementById('contentDisplay').value;
            if(!t) return;
            const ref = currentId ? db.ref(`${currentMode}/${currentId}`) : db.ref(currentMode).push();
            ref.update({title: t, content: c}).then(() => closeEditor());
        }

        function actionTrigger() {
            if(currentMode === 'json') document.getElementById('jsonInput').click();
            else openEditor(null, {title: '', content: ''});
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (res) => openEditor(null, {title: file.name.replace('.json',''), content: res.target.result});
            reader.readAsText(file);
        }

// Jab koi Trash icon par click karega
function deleteItem() {
    if (!currentId) return;
    document.getElementById('deleteModal').style.display = 'flex';
}

// Modal band karne ke liye
function closeDeleteModal() {
    document.getElementById('deleteModal').style.display = 'none';
}

// Final Delete karne ke liye
function confirmDeleteAction() {
    if (currentId) {
        db.ref(`${currentMode}/${currentId}`).remove()
            .then(() => {
                closeDeleteModal();
                closeEditor();
                showToast("Deleted Successfully", "error"); // Red toast dikhane ke liye
            })
            .catch((error) => {
                console.error("Delete failed: ", error);
            });
    }
}

function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.innerHTML = `${msg} <i class="fa-solid ${type === 'success' ? '' : ''}"></i>`;
    toast.style.background = type === 'success' ? 'var(--success)' : '#ef4444';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);
}


        
        
        
        
        function downloadFile() {
            const text = document.getElementById('contentDisplay').value;
            const title = document.getElementById('titleDisplay').value || 'file';
            const blob = new Blob([text], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = title.endsWith('.json') ? title : title + ".json";
            a.click();
        }

function copyToClipboard() { 
    const text = document.getElementById('contentDisplay').value;
    if (!text) {
        showToast("Nothing to copy!", "error");
        return;
    }
    
    navigator.clipboard.writeText(text).then(() => {
        // Yahan "Copied Successfully" message add kiya gaya hai
        showToast("Copied Successfully", "success");
    }).catch(() => {
        showToast("Copy Failed", "error");
    });
}


        function closeEditor() { document.body.classList.remove('show-editor'); }
    </script>
</body>
</html>
